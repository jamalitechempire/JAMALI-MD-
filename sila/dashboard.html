<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JAMALI MD">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>JAMALI MD | Cyber Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #050b1a, #010105);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated cyber grid */
        .cyber-bg {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 246, 255, 0.05) 0px, rgba(0, 246, 255, 0.05) 1px, transparent 1px, transparent 6px),
                        repeating-linear-gradient(90deg, rgba(0, 246, 255, 0.05) 0px, rgba(0, 246, 255, 0.05) 1px, transparent 1px, transparent 6px);
            z-index: -2;
        }
        .cyber-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 246, 255, 0.15), transparent 70%);
            animation: pulseGlow 6s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(5, 10, 25, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(0, 246, 255, 0.3);
            padding: 30px 20px;
            transition: all 0.3s;
            z-index: 10;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Space Grotesk', monospace;
            background: linear-gradient(135deg, #00f6ff, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            color: #aaa;
            transition: 0.3s;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item.active, .nav-item:hover {
            background: rgba(0, 246, 255, 0.15);
            color: #00f6ff;
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.2);
            border-left: 3px solid #00f6ff;
        }

        /* Main content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 30px;
            transition: 0.3s;
        }

        /* Glass cards */
        .glass-card {
            background: rgba(12, 15, 30, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(0, 246, 255, 0.2);
            padding: 24px;
            margin-bottom: 30px;
            transition: 0.2s;
        }
        .glass-card:hover {
            border-color: rgba(0, 246, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 246, 255, 0.2);
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0, 246, 255, 0.2);
            transition: 0.2s;
        }
        .stat-card:hover {
            border-color: #00f6ff;
            transform: translateY(-3px);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00f6ff;
            text-shadow: 0 0 8px #00f6ff;
        }

        /* Buttons */
        .btn-neon {
            background: linear-gradient(95deg, #00c6fb, #005bea);
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-neon:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00c6fb;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #00f6ff;
            color: #00f6ff;
        }

        /* Inputs */
        .input-cyber {
            background: #05080f;
            border: 1px solid #2a2f50;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            width: 100%;
            outline: none;
            transition: 0.2s;
        }
        .input-cyber:focus {
            border-color: #00f6ff;
            box-shadow: 0 0 12px #00f6ff;
        }

        /* Code display */
        .code-box {
            background: #000000aa;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid #b400ff;
            cursor: pointer;
            transition: 0.2s;
        }
        .code-digits {
            font-size: 2rem;
            letter-spacing: 6px;
            font-weight: 800;
            color: #b400ff;
            font-family: monospace;
        }

        /* Table */
        .cyber-table {
            width: 100%;
            border-collapse: collapse;
        }
        .cyber-table th, .cyber-table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 246, 255, 0.1);
        }
        .cyber-table th {
            color: #00f6ff;
            font-weight: 600;
        }
        .status-badge {
            background: rgba(0, 255, 136, 0.2);
            color: #0f0;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111;
            padding: 10px 20px;
            border-radius: 40px;
            transition: 0.3s;
            z-index: 2000;
            border-left: 4px solid #00f6ff;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Login modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #121520;
            border-radius: 28px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #00f6ff;
        }
        .modal-content input {
            width: 100%;
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                width: 80px;
                padding: 20px 10px;
            }
            .sidebar .sidebar-logo {
                font-size: 0;
            }
            .sidebar .sidebar-logo i {
                font-size: 1.8rem;
            }
            .nav-item span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
        }
        @media (max-width: 600px) {
            .main-content {
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="cyber-bg"></div>
<div id="app"></div>
<div id="toastMsg" class="toast"></div>

<script>
    // ==================== CONFIG ====================
    const ADMIN_PASSWORD = "JAMALI2026";   // Change this to your desired admin password
    let adminAuthenticated = false;
    let currentView = "pair";   // pair, dashboard, admin
    let activeSessions = [];

    // Helper: show toast
    function showToast(msg, type = "info") {
        const toast = document.getElementById("toastMsg");
        toast.innerText = msg;
        toast.style.borderLeftColor = type === "error" ? "#ff4444" : "#00f6ff";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // Fetch active sessions from backend
    async function fetchSessions() {
        try {
            const res = await fetch("/active");
            const data = await res.json();
            activeSessions = data.numbers || [];
            return activeSessions;
        } catch (err) {
            console.error(err);
            return [];
        }
    }

    // Fetch uptime for a specific number
    async function fetchUptime(number) {
        try {
            const res = await fetch(`/status?number=${number}`);
            const data = await res.json();
            return (data.uptime || 0) + "s";
        } catch (err) {
            return "--";
        }
    }

    // ==================== PAIR PAGE ====================
    function renderPairPage() {
        return `
            <div class="glass-card" style="max-width: 550px; margin: 0 auto;">
                <div style="text-align: center;">
                    <i class="fas fa-microchip" style="font-size: 3rem; color: #00f6ff; margin-bottom: 1rem;"></i>
                    <h2 style="font-family: 'Space Grotesk';">⚡ PAIR DEVICE</h2>
                    <p style="opacity: 0.7;">Connect your WhatsApp bot instantly</p>
                </div>
                <div style="background: #0a0d1a; border-radius: 1.5rem; padding: 1rem; margin: 1.5rem 0;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span><i class="fas fa-crown"></i> Owner</span>
                        <span><strong>JAMALI TECH TZ</strong> <i class="fab fa-whatsapp"></i> <a href="https://wa.me/255784062158" style="color: #0f0;">+255 784 062 158</a></span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span><i class="fas fa-hashtag"></i> Channel</span>
                        <span><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank" style="color: #0f0;">Join Channel →</a></span>
                    </div>
                </div>
                <div id="liveStatus" class="status-chip" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
                    <i class="fas fa-circle" style="color: #0f0; font-size: 0.8rem;"></i> <span>System Online</span>
                </div>
                <div class="input-group">
                    <input type="tel" id="pairNumber" class="input-cyber" placeholder="Enter number with country code" value="255">
                </div>
                <div style="display: flex; gap: 15px; margin: 15px 0;">
                    <button id="generateCodeBtn" class="btn-neon" style="flex:1"><i class="fas fa-key"></i> GET CODE</button>
                    <button id="generateQRBtn" class="btn-outline btn-neon" style="flex:1"><i class="fas fa-qrcode"></i> QR PAIR</button>
                </div>
                <div id="qrContainer" style="display: flex; justify-content: center; margin-bottom: 15px;"></div>
                <div class="code-box" id="codeBox">
                    <div class="code-digits" id="pairCodeDisplay">—— —— ——</div>
                    <div style="font-size: 0.7rem; margin-top: 8px;"><i class="fas fa-copy"></i> tap to copy</div>
                </div>
            </div>
        `;
    }

    // ==================== USER DASHBOARD ====================
    async function renderDashboard() {
        const sessions = await fetchSessions();
        let tableRows = "";
        if (sessions.length === 0) {
            tableRows = '<tr><td colspan="4">No active bots. Use Pair Device.</td></tr>';
        } else {
            for (let num of sessions) {
                const uptime = await fetchUptime(num);
                tableRows += `
                    <tr>
                        <td>${num}</td>
                        <td><span class="status-badge">● ONLINE</span></td>
                        <td>${uptime}</td>
                        <td><button class="btn-outline" style="padding: 6px 12px;" onclick="disconnectSession('${num}')">Disconnect</button></td>
                    </tr>
                `;
            }
        }
        return `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Total Bots</div></div>
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Active</div></div>
                <div class="stat-card"><div class="stat-value">⚡</div><div>JAMALI MD</div></div>
            </div>
            <div class="glass-card">
                <h3><i class="fas fa-server"></i> Your Active Bot Sessions</h3>
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table class="cyber-table">
                        <thead>
                            <tr><th>Number</th><th>Status</th><th>Uptime</th><th>Actions</th></tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>
            </div>
        `;
    }

    // ==================== ADMIN PANEL (password protected) ====================
    async function renderAdmin() {
        if (!adminAuthenticated) {
            return `
                <div class="glass-card" style="max-width: 400px; margin: 0 auto;">
                    <h2 style="text-align: center;">Admin Login</h2>
                    <input type="password" id="adminPassInput" class="input-cyber" placeholder="Enter admin password" style="margin: 20px 0;">
                    <button id="adminLoginBtn" class="btn-neon" style="width: 100%;">UNLOCK</button>
                </div>
            `;
        }
        const sessions = await fetchSessions();
        let tableRows = "";
        if (sessions.length === 0) {
            tableRows = '<td><td colspan="5">No bots connected. Pair a device first.</td></tr>';
        } else {
            for (let num of sessions) {
                const uptime = await fetchUptime(num);
                tableRows += `
                    <tr>
                        <td>${num}</td>
                        <td><span class="status-badge">● ONLINE</span></td>
                        <td>${uptime}</td>
                        <td><button class="btn-outline" style="padding: 4px 12px;" onclick="togglePremium('${num}')">Premium</button></td>
                        <td><button class="btn-outline" onclick="disconnectSession('${num}')">Disconnect</button></td>
                    </tr>
                `;
            }
        }
        return `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Total Bots</div></div>
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Active Now</div></div>
            </div>
            <div class="glass-card">
                <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;">
                    <button class="btn-neon" onclick="reconnectAll()">Reconnect All</button>
                    <button class="btn-outline btn-neon" onclick="disconnectAll()">Disconnect All</button>
                    <button class="btn-outline btn-neon" onclick="refreshAdmin()">Refresh List</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="cyber-table">
                        <thead>
                            <tr><th>Number</th><th>Status</th><th>Uptime</th><th>Premium</th><th>Action</th></tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>
            </div>
        `;
    }

    // ==================== GLOBAL RENDER ====================
    async function render() {
        let mainHtml = "";
        if (currentView === "pair") {
            mainHtml = renderPairPage();
        } else if (currentView === "dashboard") {
            mainHtml = await renderDashboard();
        } else if (currentView === "admin") {
            mainHtml = await renderAdmin();
        }

        const sidebarHtml = `
            <div class="sidebar">
                <div class="sidebar-logo"><i class="fas fa-bolt"></i> JAMALI MD</div>
                <div class="nav-item ${currentView === 'pair' ? 'active' : ''}" data-view="pair">
                    <i class="fas fa-link"></i><span>Pair Device</span>
                </div>
                <div class="nav-item ${currentView === 'dashboard' ? 'active' : ''}" data-view="dashboard">
                    <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
                </div>
                <div class="nav-item ${currentView === 'admin' ? 'active' : ''}" data-view="admin">
                    <i class="fas fa-shield-alt"></i><span>Admin Panel</span>
                </div>
            </div>
            <div class="main-content">
                ${mainHtml}
            </div>
        `;
        document.getElementById("app").innerHTML = `<div class="app-container">${sidebarHtml}</div>`;
        attachNavEvents();
        attachPairEvents();
        attachAdminLoginEvent();
        updateLiveStatus();
    }

    function attachNavEvents() {
        document.querySelectorAll(".nav-item").forEach(el => {
            el.addEventListener("click", () => {
                currentView = el.getAttribute("data-view");
                render();
            });
        });
    }

    function attachPairEvents() {
        const genBtn = document.getElementById("generateCodeBtn");
        const qrBtn = document.getElementById("generateQRBtn");
        const codeBox = document.getElementById("codeBox");
        if (genBtn) {
            genBtn.onclick = async () => {
                let num = document.getElementById("pairNumber").value.replace(/\D/g, "");
                if (num.length < 9) {
                    showToast("Invalid number", "error");
                    return;
                }
                genBtn.disabled = true;
                genBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ...';
                const codeDiv = document.getElementById("pairCodeDisplay");
                codeDiv.innerText = "⏳";
                try {
                    const res = await fetch(`/code?number=${num}`);
                    const data = await res.json();
                    if (data.code) {
                        codeDiv.innerText = data.code;
                        showToast("✅ Code generated", "success");
                    } else if (data.status === "already_connected") {
                        codeDiv.innerText = "ALREADY ACTIVE";
                        showToast("Bot already connected", "error");
                    } else {
                        codeDiv.innerText = "FAILED";
                        showToast("Failed to generate code", "error");
                    }
                } catch (err) {
                    codeDiv.innerText = "ERROR";
                    showToast("Server error", "error");
                }
                genBtn.disabled = false;
                genBtn.innerHTML = '<i class="fas fa-key"></i> GET CODE';
            };
        }
        if (qrBtn) {
            qrBtn.onclick = () => {
                let num = document.getElementById("pairNumber").value.replace(/\D/g, "");
                if (num.length < 9) {
                    showToast("Invalid number", "error");
                    return;
                }
                const qrContainer = document.getElementById("qrContainer");
                qrContainer.innerHTML = "";
                // Simulate QR code: encode the pairing endpoint URL with the number
                const pairingUrl = `${window.location.origin}/code?number=${num}`;
                new QRCode(qrContainer, {
                    text: pairingUrl,
                    width: 180,
                    height: 180,
                    colorDark: "#00f6ff",
                    colorLight: "#000000",
                    correctLevel: QRCode.CorrectLevel.H
                });
                showToast("QR generated! Scan with WhatsApp.", "success");
            };
        }
        if (codeBox) {
            codeBox.onclick = () => {
                const code = document.getElementById("pairCodeDisplay").innerText;
                if (code && !["—— —— ——", "⏳", "FAILED", "ERROR", "ALREADY ACTIVE"].includes(code)) {
                    navigator.clipboard.writeText(code);
                    showToast("Code copied!");
                } else {
                    showToast("No valid code to copy", "error");
                }
            };
        }
    }

    function attachAdminLoginEvent() {
        const loginBtn = document.getElementById("adminLoginBtn");
        if (loginBtn) {
            loginBtn.onclick = () => {
                const pass = document.getElementById("adminPassInput").value;
                if (pass === ADMIN_PASSWORD) {
                    adminAuthenticated = true;
                    render();
                } else {
                    showToast("Wrong password", "error");
                }
            };
        }
    }

    // Global actions for admin
    window.disconnectSession = async (num) => {
        if (confirm(`⚠️ Disconnect bot for ${num}? This will remove the session.`)) {
            await fetch(`/disconnect?number=${num}`);
            showToast(`Bot ${num} disconnected`, "success");
            render();
        }
    };
    window.reconnectAll = async () => {
        if (confirm("Reconnect all bots?")) {
            await fetch("/connect-all");
            showToast("Reconnecting all bots...", "info");
            setTimeout(render, 3000);
        }
    };
    window.disconnectAll = async () => {
        if (confirm("⚠️ DANGER: Disconnect ALL bots permanently?")) {
            await fetch("/disconnect-all");
            showToast("All bots disconnected", "success");
            render();
        }
    };
    window.togglePremium = async (num) => {
        try {
            const res = await fetch(`/api/config?number=${num}`);
            const cfg = await res.json();
            const newPremium = cfg.premium === "true" ? "false" : "true";
            await fetch("/api/config/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ number: num, config: { premium: newPremium } })
            });
            showToast(`Premium ${newPremium === "true" ? "enabled" : "disabled"} for ${num}`, "success");
            render();
        } catch (e) {
            showToast("Error toggling premium", "error");
        }
    };
    window.refreshAdmin = () => render();

    async function updateLiveStatus() {
        try {
            const res = await fetch("/ping");
            const status = res.ok;
            const statusDiv = document.getElementById("liveStatus");
            if (statusDiv) {
                statusDiv.innerHTML = status ? '<i class="fas fa-circle" style="color:#0f0"></i> Server Online' : '<i class="fas fa-circle" style="color:#ff4444"></i> Server Offline';
            }
        } catch (e) {
            const statusDiv = document.getElementById("liveStatus");
            if (statusDiv) statusDiv.innerHTML = '<i class="fas fa-circle" style="color:#ff4444"></i> Server Offline';
        }
    }

    // Initial render
    render();
    setInterval(updateLiveStatus, 10000);
    // Auto-refresh dashboard and admin every 15 seconds
    setInterval(() => {
        if (currentView === "dashboard" || currentView === "admin") render();
    }, 15000);
</script>
</body>
</html>
